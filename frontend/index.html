<!DOCTYPE html>
<html>
<head>
    <title>BFHL API Tester</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 40px;
        }
        textarea {
            width: 300px;
            height: 120px;
            padding: 10px;
            border-radius: 8px;
        }
        button {
            padding: 10px 20px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            cursor: pointer;
        }
        pre {
            text-align: left;
            background: #1e293b;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <h1>BFHL API Tester</h1>

    <p>Enter edges (comma separated):</p>

    <textarea id="input">
A->B,B->C
    </textarea>

    <br>

    <button onclick="sendData()">Submit</button>

    <pre id="output">Response will appear here...</pre>

    <script>
        async function sendData() {

            const raw = document.getElementById("input").value;

            const dataArray = raw.split(",").map(x => x.trim());

            const response = await fetch("https://bfhl-api-trk2.onrender.com/bfhl", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    data: dataArray
                })
            });

            const result = await response.json();

            document.getElementById("output").textContent =
                JSON.stringify(result, null, 2);
        }
    </script>

</body>
</html>
